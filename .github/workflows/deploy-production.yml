name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target: all, backend, frontend, or print"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
          - print
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            print-service/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/temple_os

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install print service dependencies
        run: npm ci
        working-directory: print-service

      - name: Check print service syntax
        run: |
          node --check index.js
          node --check ../frontend/public/print-api/app.js
          node --check ../frontend/public/print-api/launch-template-order.test.cjs
        working-directory: print-service

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/temple-os
            if [ -f docker/.env ]; then
              set -a
              . docker/.env
              set +a
            fi
            chmod +x ./deploy.sh
            ./deploy.sh "${{ github.event.inputs.target || 'all' }}"

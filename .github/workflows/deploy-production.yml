name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target: all, backend, frontend, or print"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
          - print
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            print-service/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/temple_os

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install print service dependencies
        run: |
          npm ci
          npm install --no-save playwright
          npx playwright install chromium
          sudo npx playwright install-deps chromium
        working-directory: print-service

      - name: Syntax check print service and tests
        run: |
          node --check index.js
          node --check ../frontend/public/print-api/shared.js
          node --check ../frontend/public/print-api/designer.js
          node --check ../frontend/public/print-api/print.js
          node --check ../frontend/public/print-api/manual.js
          node --check ../frontend/public/print-api/launch-template-order.test.cjs
          node --check ../frontend/public/print-api/pdf-print-quality.test.cjs
          node --check ../frontend/public/print-api/print-output.test.cjs
          node --check ../frontend/public/print-api/template-load-order.test.cjs
          node --check ../frontend/public/print-api/template-server-sync.test.cjs
          node --check ../frontend/public/print-api/workflow-status.test.cjs
        working-directory: print-service

      - name: Run print-api unit tests
        run: |
          node ../frontend/public/print-api/pdf-print-quality.test.cjs
          node ../frontend/public/print-api/print-output.test.cjs
          node ../frontend/public/print-api/template-load-order.test.cjs
          node ../frontend/public/print-api/template-server-sync.test.cjs
          node ../frontend/public/print-api/workflow-status.test.cjs
        working-directory: print-service

      - name: Run print-api browser test (Playwright)
        run: |
          node ../frontend/public/print-api/launch-template-order.test.cjs
        working-directory: print-service
        continue-on-error: true

      - name: Check deploy contract
        run: node scripts/deploy-contract.test.cjs

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verify deploy secrets
        run: |
          if [ -z "$HOST" ]; then echo "ERROR: PRODUCTION_HOST is empty"; exit 1; fi
          if [ -z "$USER" ]; then echo "ERROR: PRODUCTION_USER is empty"; exit 1; fi
          if [ -z "$KEY" ]; then echo "ERROR: PRODUCTION_SSH_KEY is empty"; exit 1; fi
          echo "Secrets OK: host=$HOST user=$USER port=${PORT:-22}"
        env:
          HOST: ${{ secrets.PRODUCTION_HOST }}
          USER: ${{ secrets.PRODUCTION_USER }}
          KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PORT: ${{ secrets.PRODUCTION_SSH_PORT }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/temple-os
            if [ -f docker/.env ]; then
              set -a
              . docker/.env
              set +a
            fi
            chmod +x ./deploy.sh
            ./deploy.sh "${{ github.event.inputs.target || 'all' }}"

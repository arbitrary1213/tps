<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temple OS 启动中</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="setup-page">
      <section class="setup-card">
        <div>
          <h1>Temple OS 寺院工作台</h1>
          <p id="subtitle" class="hint">正在准备本地工作台</p>
        </div>
        <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
        <pre id="statusLog" class="hint output">正在启动...</pre>
        <div class="actions">
          <button id="retryBtn" class="primary" type="button">重试启动</button>
          <button id="setupBtn" type="button">连接设置</button>
        </div>
      </section>
    </main>
    <script src="./loading.js"></script>
  </body>
</html>

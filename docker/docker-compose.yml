version: '3.8'

services:
  temple-db:
    image: postgres:15-alpine
    container_name: temple-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-temple_os}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d temple_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  temple-backend:
    build:
      context: ../backend
      dockerfile: ../backend/Dockerfile
    container_name: temple-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@localhost:5432/${POSTGRES_DB:-temple_os}
      JWT_SECRET: ${JWT_SECRET:-SrpuIPv+t/9AUKrOOarrVxgU6CuoiSKvmt3X2SBRHaA=}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://temple.example.com}
      PORT: 3002
      NODE_ENV: production
    volumes:
      - ./logs:/app/logs
    network_mode: host
    depends_on:
      temple-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  temple-frontend:
    build:
      context: ../frontend
      dockerfile: ../frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
    container_name: temple-frontend
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
      NODE_ENV: production
      HOSTNAME: ""
    network_mode: host
    depends_on:
      temple-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  temple-print:
    build:
      context: ..
      dockerfile: print-service/Dockerfile
    container_name: temple-print
    environment:
      PORT: 3001
      NODE_ENV: production
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  temple-nginx:
    image: nginx:alpine
    container_name: temple-nginx
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      - /var/www/html:/var/www/html
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/__DOMAIN__/$${DOMAIN}/g" /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    network_mode: host
    depends_on:
      temple-frontend:
        condition: service_healthy
      temple-backend:
        condition: service_healthy
      temple-print:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

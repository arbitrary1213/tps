<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>牌位套打软件</title>
  <link rel="stylesheet" href="styles.css?v=20260517-1130">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>牌位套打</h1>
      <p>本地导入数据，预览套打版式，再调用系统打印机打印。</p>
    </div>
    <div class="header-actions">
      <button id="sampleBtn" type="button">载入示例</button>
      <button id="printBtn" class="primary" type="button">打印</button>
    </div>
  </header>

  <section id="workflowStatus" class="workflow-status" aria-label="打印状态">
    <div class="workflow-status-item">
      <span class="workflow-status-label">数据来源</span>
      <strong id="dataSourceValue" class="workflow-status-value">尚未导入</strong>
    </div>
    <span class="workflow-status-sep">·</span>
    <div class="workflow-status-item">
      <span class="workflow-status-label">模板</span>
      <strong id="templateSourceValue" class="workflow-status-value">内置模板</strong>
    </div>
  </section>

  <main class="workspace">
    <aside class="panel controls">
      <button class="panel-toggle" type="button" title="折叠/展开左侧面板" aria-label="折叠左侧面板">◀</button>
      <span class="panel-collapse-label">控制面板</span>
      <section>
        <h2>打印类型</h2>
        <div class="segmented" role="group" aria-label="打印类型">
          <button class="active" type="button" data-mode="single">单张牌位</button>
          <button type="button" data-mode="summary">汇总多列</button>
        </div>
      </section>

      <section>
        <h2>导入数据</h2>
        <label class="file-picker">
          <input id="fileInput" type="file" accept=".csv,.txt">
          选择 CSV 文件
        </label>
        <textarea id="pasteInput" rows="7" placeholder="也可以从 Excel 复制表格后粘贴到这里，第一行作为表头"></textarea>
        <button id="pasteBtn" type="button">使用粘贴数据</button>
        <div id="manualInputSection" style="margin-top:10px; border:1px solid var(--line); border-radius:6px; padding:10px; background:var(--surface);">
          <p class="hint" style="margin-bottom:6px;">手动输入单张：直接在下方填写字段值后点"填入预览"</p>
          <div id="manualInputFields"></div>
          <button id="applyManualInputBtn" type="button" style="margin-top:6px;">填入预览</button>
        </div>
        <p class="hint">支持图片或 PDF 作为参考底图；PDF 会自动使用第 1 页。</p>
        <div class="grid-2">
          <label>
            关键词
            <input id="systemKeyword" type="search" placeholder="姓名、阳上">
          </label>
          <label>
            状态
            <select id="systemStatus">
              <option value="ACTIVE">有效</option>
              <option value="">全部</option>
              <option value="EXPIRED">已过期</option>
              <option value="CANCELLED">已取消</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            法会
            <select id="systemRitual">
              <option value="">全部法会</option>
            </select>
          </label>
          <label>
            牌位分类
            <select id="systemPlaqueType">
              <option value="">按当前模板自动选择</option>
              <option value="LONGEVITY">延生禄位</option>
              <option value="REBIRTH">往生莲位</option>
              <option value="DELIVERANCE">超度牌位</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            分类细项
            <select id="systemPlaqueSubtype">
              <option value="">全部细项</option>
              <optgroup label="延生禄位">
                <option value="祈福禄位">祈福禄位</option>
                <option value="化太岁禄位">化太岁禄位</option>
                <option value="财神禄位">财神禄位</option>
                <option value="文殊禄位">文殊禄位</option>
              </optgroup>
            </select>
          </label>
          <label>
            规格
            <select id="systemSize">
              <option value="">全部规格</option>
              <option value="小">小</option>
              <option value="中">中</option>
              <option value="大">大</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            开始日期
            <input id="systemStartDate" type="date">
          </label>
          <label>
            结束日期
            <input id="systemEndDate" type="date">
          </label>
        </div>
        <button id="loadSystemDataBtn" type="button">读取数据</button>
        <div id="believerSearchArea" style="margin-top:10px;">
          <button id="openBelieverSearchBtn" type="button" class="btn-sm">按信人加载</button>
          <div id="believerSearchPanel" hidden style="margin-top:8px; border:1px solid var(--line); border-radius:6px; padding:10px; background:var(--surface);">
            <input id="believerSearchInput" type="search" placeholder="搜索信人姓名或电话...">
            <div id="believerSearchResults" style="max-height:160px; overflow-y:auto; margin-top:4px;"></div>
            <p class="hint" style="margin-top:4px;">选择信人后将加载其关联的全部牌位</p>
          </div>
        </div>
        <p id="dataHint" class="hint">先选择牌位分类，再导入对应数据。延生和超度的数据会分开保存，不会混在一起。</p>
      </section>

      <section>
        <h2>模板</h2>
        <label>
          模板
          <select id="templateSelect"></select>
        </label>
        <label>
          纸张
          <select id="paperSelect">
            <option value="A3">A3 297x420mm</option>
            <option value="A4">A4 210x297mm</option>
            <option value="A5">A5 148x210mm</option>
            <option value="custom">自定义</option>
          </select>
        </label>
        <div class="grid-2">
          <label>
            宽(mm)
            <input id="paperWidth" type="number" min="30" value="210">
          </label>
          <label>
            高(mm)
            <input id="paperHeight" type="number" min="1" value="297">
          </label>
        </div>
        <label class="checkbox">
          <input id="designPrintBackgroundGraphics" type="checkbox" checked>
          打印 PDF / 参考底图
        </label>
      </section>

      <section id="summarySettings" hidden>
        <h2>汇总设置</h2>
        <label>
          编辑版式
          <select id="summaryVariant"></select>
        </label>
        <div id="summaryFieldMapping" class="field-mapping"></div>
        <textarea id="summaryFormat" rows="7" hidden>{{牌位主体}}
{{阳上}}
{{地址}}</textarea>
        <div class="grid-2">
          <label>
            每页列数
            <input id="columnCount" type="number" min="1" max="20" value="3">
          </label>
          <label>
            每列最多行
            <input id="rowsPerColumn" type="number" min="1" max="80" value="18">
          </label>
        </div>
        <div class="grid-2">
          <label>
            字号
            <input id="summaryFont" type="number" min="10" max="48" value="22">
          </label>
          <label>
            行距
            <input id="summaryLineGap" type="number" min="0" max="40" value="8">
          </label>
        </div>
        <div class="grid-2">
          <label>
            页边距
            <input id="pageMargin" type="number" min="0" max="60" value="14">
          </label>
          <label>
            列间距
            <input id="columnGap" type="number" min="0" max="50" value="8">
          </label>
        </div>
        <label class="checkbox">
          <input id="summaryVertical" type="checkbox">
          竖排汇总
        </label>
      </section>
    </aside>

    <section class="preview-shell">
      <div class="preview-toolbar">
        <div>
          <strong id="statusText">暂无数据</strong>
          <span id="pageText"></span>
        </div>
        <span class="print-preview-tip">打印预览</span>
        <div class="pager">
          <button id="prevBtn" type="button">上一页</button>
          <button id="nextBtn" type="button">下一页</button>
          <input id="jumpPageInput" type="number" min="1" value="1" aria-label="跳转张数">
          <button id="jumpPageBtn" type="button">跳转</button>
          <button id="printFromPageBtn" type="button">从此页打印</button>
        </div>
      </div>
      <div id="preview" class="preview"></div>
    </section>

    <aside class="panel data-panel">
      <button class="panel-toggle" type="button" title="折叠/展开右侧数据面板" aria-label="折叠右侧面板">▶</button>
      <span class="panel-collapse-label">数据面板</span>
      <section>
        <h2>数据表</h2>
        <div class="data-actions">
          <button id="selectAllRowsBtn" type="button">全选</button>
          <button id="clearSelectedRowsBtn" type="button">清空</button>
          <span id="selectedRowsText">未选择时默认打印全部</span>
        </div>
        <div id="tableWrap" class="table-wrap">
          <p class="empty">还没有导入数据。</p>
        </div>
      </section>
    </aside>
  </main>

  <script src="shared.js?v=20260517-1130"></script>
  <script src="print.js?v=20260517-1130"></script>
</body>
</html>

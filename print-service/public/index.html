<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>牌位套打软件</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>牌位套打</h1>
      <p>本地导入数据，预览套打版式，再调用系统打印机打印。</p>
    </div>
    <div class="header-actions">
      <button id="sampleBtn" type="button">载入示例</button>
      <button id="printBtn" class="primary" type="button">打印预览</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="panel controls">
      <section>
        <h2>打印类型</h2>
        <div class="segmented" role="group" aria-label="打印类型">
          <button class="active" type="button" data-mode="single">单张牌位</button>
          <button type="button" data-mode="summary">汇总多列</button>
        </div>
      </section>

      <section>
        <h2>导入数据</h2>
        <label class="file-picker">
          <input id="fileInput" type="file" accept=".csv,.txt">
          选择 CSV 文件
        </label>
        <textarea id="pasteInput" rows="7" placeholder="也可以从 Excel 复制表格后粘贴到这里，第一行作为表头。"></textarea>
        <button id="pasteBtn" type="button">使用粘贴数据</button>
        <div class="grid-2">
          <label>
            关键词
            <input id="systemKeyword" type="search" placeholder="姓名、阳上">
          </label>
          <label>
            状态
            <select id="systemStatus">
              <option value="ACTIVE">有效</option>
              <option value="">全部</option>
              <option value="EXPIRED">已过期</option>
              <option value="CANCELLED">已取消</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            法会
            <select id="systemRitual">
              <option value="">全部法会</option>
            </select>
          </label>
          <label>
            牌位分类
            <select id="systemPlaqueType">
              <option value="">按导入按钮自动选择</option>
              <option value="LONGEVITY">延生禄位</option>
              <option value="REBIRTH">往生莲位</option>
              <option value="DELIVERANCE">超度牌位</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            子类型
            <select id="systemPlaqueSubtype">
              <option value="">全部子类型</option>
              <optgroup label="延生禄位">
                <option value="祈福禄位">祈福禄位</option>
                <option value="化太岁禄位">化太岁禄位</option>
                <option value="财神禄位">财神禄位</option>
                <option value="文殊禄位">文殊禄位</option>
              </optgroup>
            </select>
          </label>
          <label>
            规格
            <select id="systemSize">
              <option value="">全部规格</option>
              <option value="小">小</option>
              <option value="中">中</option>
              <option value="大">大</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            开始日期
            <input id="systemStartDate" type="date">
          </label>
          <label>
            结束日期
            <input id="systemEndDate" type="date">
          </label>
        </div>
        <div class="grid-2">
          <button id="loadBlessingDataBtn" type="button">读取延生数据</button>
          <button id="loadDeliveranceDataBtn" type="button">读取往生数据</button>
        </div>
        <p id="dataHint" class="hint">先选择牌位分类，再导入对应数据。延生和超度的数据会分开保存，不会混在一起。</p>
      </section>

      <section>
        <h2>模板</h2>
        <label>
          模板
          <select id="templateSelect"></select>
        </label>
        <button id="newTemplateBtn" type="button">新建模板</button>
        <button id="deleteTemplateBtn" type="button">删除模板</button>
        <label>
          纸张
          <select id="paperSelect">
            <option value="A3">A3 297x420mm</option>
            <option value="A4">A4 210x297mm</option>
            <option value="A5">A5 148x210mm</option>
            <option value="custom">自定义</option>
          </select>
        </label>
        <div class="grid-2">
          <label>
            宽 mm
            <input id="paperWidth" type="number" min="30" value="210">
          </label>
          <label>
            高 mm
            <input id="paperHeight" type="number" min="30" value="297">
          </label>
        </div>
        <label class="file-picker">
          <input id="bgInput" type="file" accept="image/*">
          上传参考底图
        </label>
        <div class="grid-2">
          <button id="saveTemplateBtn" type="button">保存模板</button>
          <button id="resetTemplateBtn" type="button">重置模板</button>
        </div>
        <label class="checkbox">
          <input id="showBg" type="checkbox" checked>
          显示参考底图
        </label>
      </section>

      <section id="singleSettings">
        <h2>牌位设置</h2>
        <label>
          牌位分类
          <select id="tabletType">
            <option value="blessing">延生禄位</option>
            <option value="deliveranceDetail">超度牌位 - 详细</option>
            <option value="deliveranceSimple">超度牌位 - 简版</option>
            <option value="custom">自定义模板</option>
          </select>
        </label>
        <div id="fieldMapping" class="field-mapping"></div>
        <div class="static-field-tools">
          <label>
            静态字段
            <input id="staticFieldText" type="text" placeholder="输入固定文字">
          </label>
          <button id="addStaticFieldBtn" type="button">添加静态字段</button>
        </div>
        <div class="field-style-editor">
          <h3>字段样式</h3>
          <label>
            编辑字段
            <select id="styleField"></select>
          </label>
          <div class="grid-2">
            <label>
              字号
              <input id="fieldFontSize" type="number" min="8" max="120" value="18">
            </label>
            <label>
              颜色
              <input id="fieldColor" type="color" value="#16110d">
            </label>
          </div>
          <label>
            字体
            <select id="fieldFontFamily">
              <option value="SimSun, serif">宋体</option>
              <option value="KaiTi, STKaiti, serif">楷体</option>
              <option value='Microsoft YaHei, sans-serif'>微软雅黑</option>
              <option value="serif">系统衬线</option>
            </select>
          </label>
        </div>
        <div class="grid-2">
          <label>
            主体字号
            <input id="singleFont" type="number" min="12" max="90" value="36">
          </label>
          <label>
            上偏移
            <input id="singleOffsetY" type="number" min="-80" max="120" value="0">
          </label>
        </div>
        <label class="checkbox">
          <input id="singleVertical" type="checkbox" checked>
          竖排文字
        </label>
      </section>

      <section id="summarySettings" hidden>
        <h2>汇总设置</h2>
        <label>
          数据分类
          <select id="summaryDataGroup">
            <option value="blessing">延生禄位</option>
            <option value="deliverance">往生/超度牌位</option>
          </select>
        </label>
        <label>
          每列内容格式
          <textarea id="summaryFormat" rows="7">{{牌位主体}}
{{阳上}}
{{地址}}</textarea>
        </label>
        <div class="grid-2">
          <label>
            每页列数
            <input id="columnCount" type="number" min="1" max="30" value="3">
          </label>
          <label>
            每列最多行
            <input id="rowsPerColumn" type="number" min="1" max="80" value="18">
          </label>
        </div>
        <div class="grid-2">
          <label>
            字号
            <input id="summaryFont" type="number" min="10" max="48" value="22">
          </label>
          <label>
            行距
            <input id="summaryLineGap" type="number" min="0" max="40" value="8">
          </label>
        </div>
        <div class="grid-2">
          <label>
            页边距
            <input id="pageMargin" type="number" min="0" max="60" value="14">
          </label>
          <label>
            列间距
            <input id="columnGap" type="number" min="0" max="50" value="8">
          </label>
        </div>
        <label class="checkbox">
          <input id="summaryVertical" type="checkbox">
          竖排汇总
        </label>
      </section>
    </aside>

    <section class="preview-shell">
      <div class="preview-toolbar">
        <div>
          <strong id="statusText">暂无数据</strong>
          <span id="pageText"></span>
        </div>
        <span class="edit-tip">拖动字段即可调整位置</span>
        <div class="pager">
          <button id="prevBtn" type="button">上一页</button>
          <button id="nextBtn" type="button">下一页</button>
        </div>
      </div>
      <div id="preview" class="preview"></div>
    </section>

    <aside class="panel data-panel">
      <section>
        <h2>数据表</h2>
        <div class="data-actions">
          <button id="selectAllRowsBtn" type="button">全选</button>
          <button id="clearSelectedRowsBtn" type="button">清空</button>
          <span id="selectedRowsText">未选择时默认打印全部</span>
        </div>
        <div id="tableWrap" class="table-wrap">
          <p class="empty">还没有导入数据。</p>
        </div>
      </section>
    </aside>
  </main>

  <dialog id="newTemplateDialog">
    <h2>新建模板</h2>
    <form method="dialog" id="newTemplateForm">
      <label>
        模板名称
        <input id="newTemplateName" type="text" required>
      </label>
      <div class="grid-2">
        <label>
          纸张宽度(mm)
          <input id="newTemplateWidth" type="number" min="30" value="90">
        </label>
        <label>
          纸张高度(mm)
          <input id="newTemplateHeight" type="number" min="30" value="260">
        </label>
      </div>
      <label class="checkbox">
        <input id="newTemplateVertical" type="checkbox" checked>
        竖向排版
      </label>
      <fieldset>
        <legend>字段选择</legend>
        <div id="fieldSelection"></div>
        <button type="button" id="selectAllFields">全选</button>
        <button type="button" id="deselectAllFields">取消全选</button>
      </fieldset>
      <div class="dialog-actions">
        <button type="button" id="cancelNewTemplate">取消</button>
        <button type="button" id="confirmNewTemplate" class="primary">创建</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
